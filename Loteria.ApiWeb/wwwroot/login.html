<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login Jugadores | Loter&iacute;a Virtual</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <main class="login-page">
        <section class="login-panel" aria-labelledby="login-title">
            <div class="brand-mark" aria-hidden="true">
                <span>LV</span>
            </div>

            <div class="text-center mb-4">
                <p class="login-kicker mb-2">Loter&iacute;a Virtual</p>
                <h1 id="login-title" class="login-title mb-2">Iniciar sesi&oacute;n</h1>
                <p class="login-subtitle mb-0">Accede a tu cuenta de jugador.</p>
            </div>

            <form id="login-form">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control form-control-lg" id="username" name="username" placeholder="jugador2010" autocomplete="username" required>
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label">Contrase&ntilde;a</label>
                    <input type="password" class="form-control form-control-lg" id="password" name="password" placeholder="Ingresa tu contrase&ntilde;a" autocomplete="current-password" required>
                </div>
                <div id="mensaje-error" class="text-danger text-center mb-3 d-none"></div>
                <div id="mensaje-exito" class="text-success text-center mb-3 d-none"></div>
                <button type="submit" id="btn-login" class="btn btn-primary btn-lg w-100">Iniciar sesi&oacute;n</button>
            </form>

            <p class="register-link mb-0">
                &iquest;No tienes cuenta?
                <a href="registro.html">Registrarse</a>
            </p>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="js/login.js?v=1"></script>
</body>
</html>
