<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mis Jugadas | Loter&iacute;a Virtual</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/index.css">
    <style>
        .jugada-card {
            border: 1px solid rgba(13, 110, 253, .16);
            border-radius: .5rem;
            box-shadow: 0 .75rem 2rem rgba(15, 23, 42, .08);
        }

        .carton-scroll {
            overflow-x: auto;
            padding-bottom: .25rem;
        }

        .carton-grid {
            background: #0d6efd;
            border: 3px solid #0d6efd;
            display: grid;
            gap: 2px;
            grid-template-columns: repeat(9, minmax(48px, 1fr));
            min-width: 560px;
        }

        .carton-cell {
            align-items: center;
            background: #ffffff;
            color: #212529;
            display: flex;
            font-size: 1.55rem;
            font-weight: 800;
            justify-content: center;
            line-height: 1;
            min-height: 58px;
            text-align: center;
            user-select: none;
        }

        .carton-cell.is-empty {
            background:
                linear-gradient(135deg, rgba(255, 255, 255, 0.18) 25%, transparent 25%) -8px 0 / 16px 16px,
                linear-gradient(225deg, rgba(255, 255, 255, 0.18) 25%, transparent 25%) -8px 0 / 16px 16px,
                #cfe2ff;
        }

        @media (max-width: 767.98px) {
            .carton-grid {
                grid-template-columns: repeat(9, minmax(42px, 1fr));
                min-width: 500px;
            }

            .carton-cell {
                font-size: 1.25rem;
                min-height: 50px;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="index.html">Loter&iacute;a Virtual</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarPrincipal" aria-controls="navbarPrincipal" aria-expanded="false" aria-label="Alternar navegaci&oacute;n">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarPrincipal">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="sorteos.html">Sorteos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="mis-jugadas.html">Mis Jugadas</a>
                    </li>
                </ul>
                <button type="button" id="btn-logout" class="btn btn-outline-light">Cerrar sesi&oacute;n</button>
            </div>
        </div>
    </nav>

    <main class="container py-4 py-lg-5">
        <section class="dashboard-hero mb-4 mb-lg-5">
            <p class="text-uppercase fw-semibold mb-2 opacity-75">Panel del jugador</p>
            <h1 class="display-6 fw-bold mb-2">Mis Jugadas</h1>
            <p class="lead mb-0">Seguimiento de tus cartones reservados y vendidos.</p>
        </section>

        <div id="mensaje-error" class="alert alert-danger d-none" role="alert"></div>
        <div id="mensaje-vacio" class="alert alert-info d-none" role="alert">
            Todav&iacute;a no ten&eacute;s jugadas registradas.
        </div>

        <section class="row g-4" id="contenedor-mis-jugadas" aria-label="Mis jugadas"></section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="js/mis-jugadas.js"></script>
</body>
</html>
