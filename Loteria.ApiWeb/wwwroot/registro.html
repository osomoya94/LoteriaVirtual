<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registro Jugadores | Loter&iacute;a Virtual</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <main class="login-page">
        <section class="login-panel" aria-labelledby="registro-title">
            <div class="brand-mark" aria-hidden="true">
                <span>LV</span>
            </div>

            <div class="text-center mb-4">
                <p class="login-kicker mb-2">Loter&iacute;a Virtual</p>
                <h1 id="registro-title" class="login-title mb-2">Crear cuenta</h1>
                <p class="login-subtitle mb-0">Registra tus datos para jugar.</p>
            </div>

            <form id="registro-form">
                <div class="mb-3">
                    <label for="nombre" class="form-label">Nombre</label>
                    <input type="text" class="form-control form-control-lg" id="nombre" name="nombre" autocomplete="given-name" required>
                </div>

                <div class="mb-3">
                    <label for="apellido" class="form-label">Apellido</label>
                    <input type="text" class="form-control form-control-lg" id="apellido" name="apellido" autocomplete="family-name" required>
                </div>

                <div class="mb-3">
                    <label for="dni" class="form-label">Dni</label>
                    <input type="text" class="form-control form-control-lg" id="dni" name="dni" inputmode="numeric" required>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control form-control-lg" id="email" name="email" autocomplete="email" required>
                </div>

                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control form-control-lg" id="username" name="username" autocomplete="username" required>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <div class="input-group">
                        <input type="password" class="form-control form-control-lg" id="password" name="password" autocomplete="new-password" required>
                        <button class="btn btn-outline-secondary" type="button" id="btn-ver-pass" aria-label="Mostrar contrasena" title="Mostrar contrasena">&#128065;</button>
                    </div>
                    <div id="password-help" class="form-text text-muted">
                        Mínimo 8 caracteres, una mayúscula y un carácter especial (!@#$...).
                    </div>
                </div>

                <div class="mb-4">
                    <label for="password-confirm" class="form-label">Repetir Password</label>
                    <div class="input-group">
                        <input type="password" class="form-control form-control-lg" id="password-confirm" name="password-confirm" autocomplete="new-password" required>
                        <button class="btn btn-outline-secondary" type="button" id="btn-ver-confirm" aria-label="Mostrar contrasena" title="Mostrar contrasena">&#128065;</button>
                    </div>
                </div>


                <div id="mensaje-error" class="text-danger text-center mb-3 d-none"></div>
                <div id="mensaje-exito" class="text-success text-center mb-3 d-none"></div>

                <button type="submit" id="btn-registro" class="btn btn-primary btn-lg w-100">Crear cuenta</button>
            </form>

            <p class="register-link mb-0">
                &iquest;Ya tienes cuenta?
                <a href="login.html">Iniciar sesi&oacute;n</a>
            </p>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="js/registro.js?v=2"></script>
</body>
</html>
